<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SANAD - سند — مساعدك الذكي</title>
    <meta name="description" content="مساعد SANAD - سند الذكي لرعاية كبار السن" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/css/global.css" />
    <style>
        body {
            background: linear-gradient(160deg, #0B1929 0%, #0E2240 60%, #0B1929 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background: rgba(14, 34, 64, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 3px 15px rgba(27, 95, 173, 0.35);
        }

        .bot-avatar img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--success);
        }

        .bot-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message.bot {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-bubble {
            padding: 0.875rem 1.1rem;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background: rgba(27, 95, 173, 0.2);
            border: 1px solid rgba(27, 95, 173, 0.3);
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 2px;
            color: #F1F5F9;
        }

        .message.bot .message-bubble {
            background: rgba(14, 34, 64, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-lg) var(--radius-lg) 2px var(--radius-lg);
            color: #F1F5F9;
        }

        .message-time {
            font-size: 0.7rem;
            color: #64748B;
            margin-top: 0.25rem;
            padding: 0 0.25rem;
        }

        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.875rem 1.1rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #64748B;
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            background: rgba(14, 34, 64, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            backdrop-filter: blur(20px);
        }

        .chat-input-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-textarea {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            padding: 0.875rem 1rem;
            font-family: var(--font);
            font-size: 1rem;
            color: #F1F5F9;
            direction: rtl;
            resize: none;
            min-height: 52px;
            max-height: 120px;
            transition: var(--transition);
        }

        .chat-textarea::placeholder {
            color: #64748B;
        }

        .chat-textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(27, 95, 173, 0.2);
        }

        .send-btn {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 3px 12px rgba(27, 95, 173, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(27, 95, 173, 0.45);
        }

        .send-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .placeholder-banner {
            background: rgba(245, 166, 35, 0.1);
            border: 1px solid rgba(245, 166, 35, 0.25);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--accent-light);
            margin-bottom: 1rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: #94A3B8;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
            margin-right: auto;
            transition: var(--transition);
        }

        .back-btn:hover {
            color: #F1F5F9;
        }

        .welcome-msg {
            text-align: center;
            color: #94A3B8;
            padding: 1.5rem 0;
        }

        .welcome-msg img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin: 0 auto 0.75rem;
            display: block;
            filter: drop-shadow(0 2px 10px rgba(27, 95, 173, 0.3));
        }

        .welcome-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.75rem;
        }

        .suggestion-chip {
            padding: 0.55rem 1.1rem;
            background: rgba(27, 95, 173, 0.12);
            border: 1px solid rgba(27, 95, 173, 0.25);
            border-radius: var(--radius-full);
            font-size: 0.88rem;
            cursor: pointer;
            color: #F1F5F9;
            font-family: var(--font);
            transition: var(--transition);
        }

        .suggestion-chip:hover {
            background: rgba(27, 95, 173, 0.25);
            border-color: rgba(27, 95, 173, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="chat-layout">
        <div class="chat-header">
            <div class="bot-avatar">
                <img src="/logo.png" alt="SANAD - سند" />
            </div>
            <div style="flex:1;">
                <div style="font-size:1.1rem; font-weight:800; color: #F1F5F9;">SANAD - سند</div>
                <div class="bot-status">متاح دائماً</div>
            </div>
            <button class="back-btn" onclick="history.back()">✕</button>
        </div>

        <div id="chatMessages" class="chat-messages">
            <div class="welcome-msg animate-fade-in">
                <img src="/logo.png" alt="SANAD - سند" />
                <div style="font-size:1.05rem; font-weight:600; color: #F1F5F9;">أهلاً! أنا سند، مساعدك الصحي
                    الشخصي</div>
                <div style="font-size:0.88rem; margin-top:0.4rem;">هقدر أساعدك في أي حاجة تتعلق بصحتك</div>
                <div class="welcome-suggestions">
                    <button class="suggestion-chip" onclick="sendQuick('إيه أعراض ارتفاع الضغط؟')">💊 ارتفاع
                        الضغط</button>
                    <button class="suggestion-chip" onclick="sendQuick('احتاج نصيحة عن الغذاء الصحي')">🥗 نصيحة
                        غذائية</button>
                    <button class="suggestion-chip" onclick="sendQuick('كيف أتعامل مع الأرق؟')">😴 الأرق</button>
                    <button class="suggestion-chip" onclick="sendQuick('وين أقرب مستشفى؟')">🏥 مستشفيات</button>
                </div>
            </div>
            <div class="placeholder-banner">
                🔬 SANAD - سند في طور التطوير — الردود الحالية هي نماذج تجريبية
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-row">
                <textarea id="chatInput" class="chat-textarea" placeholder="اكتب رسالتك لسند..." rows="1"
                    onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="إرسال">➤</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="/js/api.js"></script>
    <script src="/js/chat.js"></script>
</body>

</html>
