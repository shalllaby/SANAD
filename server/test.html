<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Character Profile - Menna</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --card-bg: #ffffff;
            --sidebar-bg: #eef2f5;
            --primary-text: #1a2b3c;
            --secondary-text: #707e8a;
            --icon-bg: #e8f0f4;
            --accent-color: #5c8ca7;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            width: 1000px;
            max-width: 95%;
            gap: 20px;
            perspective: 1000px;
        }

        /* Profile Card Styling */
        .profile-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex: 2;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: cardSlideIn 0.6s ease-out forwards;
        }

        .character-art-container {
            width: 250px;
            position: relative;
            margin-right: 40px;
        }

        .character-art {
            width: 100%;
            display: block;
        }

        /* The pale blue highlight area behind the character */
        .character-highlight {
            position: absolute;
            background-color: #e2ecf2;
            width: 280px;
            height: 380px;
            border-radius: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .profile-details h1 {
            color: var(--primary-text);
            font-size: 56px;
            margin: 0;
            font-weight: 600;
        }

        .profile-details .subtitle {
            color: var(--secondary-text);
            font-size: 16px;
            margin: 5px 0 30px 0;
        }

        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: listItemFade 0.5s ease-out forwards;
        }

        .info-item:nth-child(1) {
            animation-delay: 0.2s;
        }

        .info-item:nth-child(2) {
            animation-delay: 0.3s;
        }

        .info-item:nth-child(3) {
            animation-delay: 0.4s;
        }

        .info-item:nth-child(4) {
            animation-delay: 0.5s;
        }

        .info-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-color: var(--icon-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            color: #5d707c;
        }

        .info-text .label {
            color: var(--primary-text);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .info-text .value {
            color: var(--primary-text);
            font-size: 16px;
            text-decoration: none;
        }

        a.value {
            border-bottom: 1px solid currentColor;
            transition: var(--transition);
        }

        a.value:hover {
            color: var(--accent-color);
        }

        /* Sidebar Styling */
        .sidebar {
            background-color: var(--sidebar-bg);
            border-radius: 20px;
            width: 250px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(20px);
            animation: sidebarSlideIn 0.6s ease-out forwards 0.2s;
        }

        .user-header {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 30px;
        }

        .user-avatar-mini {
            width: 32px;
            height: 32px;
            margin-right: 10px;
        }

        .user-name {
            color: var(--primary-text);
            font-weight: 600;
            font-size: 16px;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 12px;
            text-decoration: none;
            color: #5d707c;
            font-size: 16px;
            transition: var(--transition);
            margin-bottom: 5px;
            position: relative;
        }

        .nav-link:hover {
            color: var(--accent-color);
            background-color: rgba(92, 140, 167, 0.05);
        }

        .nav-link.active {
            color: #5d707c;
            background-color: rgba(0, 0, 0, 0.03);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column-reverse;
                align-items: center;
            }

            .sidebar {
                width: 100%;
                margin-bottom: 20px;
                animation: sidebarSlideInMobile 0.6s ease-out forwards;
            }

            .profile-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .character-art-container {
                margin-right: 0;
                margin-bottom: 20px;
            }

            .info-item {
                justify-content: center;
                text-align: left;
            }
        }

        /* Animations */
        @keyframes cardSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes sidebarSlideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes sidebarSlideInMobile {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes listItemFade {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
